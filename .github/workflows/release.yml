name: Release

on:
  workflow_call:
    inputs:
      image-name:
        type: string
        required: true
        description: "Docker image name (e.g. 'org-api')"
      helm-values-key:
        type: string
        required: true
        description: "Helm values.yaml key path for image tag (e.g. 'orgApi.image.tag')"
      dockerfile:
        type: string
        default: "Dockerfile"
      context:
        type: string
        default: "."
    secrets:
      HELM_BUMP_TOKEN:
        required: false
        description: "PAT with contents:write on helm-charts (for the bump step)"
      SHARED_LIB_TOKEN:
        required: false
        description: "PAT to install orgtopus-shared during docker build (Python services)"

jobs:
  release:
    runs-on: self-hosted
    permissions:
      contents: write
      packages: write
    env:
      DOCKER_CONFIG: ${{ runner.temp }}/.docker
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      # Build and push Docker image with version tag
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            GITHUB_TOKEN=${{ secrets.SHARED_LIB_TOKEN || secrets.HELM_BUMP_TOKEN }}
          tags: |
            ghcr.io/orgtopus-hd/${{ inputs.image-name }}:${{ steps.version.outputs.version }}
            ghcr.io/orgtopus-hd/${{ inputs.image-name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true

      - name: Bump helm chart version
        uses: Orgtopus-HD/.github/.github/actions/bump-helm-values@master
        with:
          helm-values-key: ${{ inputs.helm-values-key }}
          version: ${{ steps.version.outputs.version }}
          image-name: ${{ inputs.image-name }}
          helm-bump-token: ${{ secrets.HELM_BUMP_TOKEN }}
