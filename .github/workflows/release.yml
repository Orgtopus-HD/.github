name: Release

on:
  workflow_call:
    inputs:
      image-name:
        type: string
        required: true
        description: "Docker image name (e.g. 'org-api')"
      helm-values-key:
        type: string
        required: true
        description: "Helm values.yaml key path for image tag (e.g. 'orgApi.image.tag')"
      dockerfile:
        type: string
        default: "Dockerfile"
      context:
        type: string
        default: "."
    secrets:
      HELM_BUMP_TOKEN:
        required: true
        description: "PAT with repo scope for creating PRs in helm-charts repo"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      # Build and push Docker image with version tag
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ghcr.io/orgtopus-hd/${{ inputs.image-name }}:${{ steps.version.outputs.version }}
            ghcr.io/orgtopus-hd/${{ inputs.image-name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true

      # Bump version in helm-charts values.yaml
      - name: Bump helm chart version
        env:
          GH_TOKEN: ${{ secrets.HELM_BUMP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          HELM_KEY: ${{ inputs.helm-values-key }}
          IMAGE_NAME: ${{ inputs.image-name }}
        run: |
          # Clone helm-charts
          git clone "https://x-access-token:${GH_TOKEN}@github.com/Orgtopus-HD/helm-charts.git" /tmp/helm-charts
          cd /tmp/helm-charts

          # Create branch
          BRANCH="bump/${IMAGE_NAME}-${VERSION}"
          git checkout -b "$BRANCH"

          # Update the tag in values.yaml
          # Convert dot-path like "orgApi.image.tag" to sed pattern
          # We need to find the line with "tag:" under the right section
          python3 -c "
          import re, sys

          key_path = '${HELM_KEY}'
          version = '${VERSION}'

          parts = key_path.split('.')
          # parts = ['orgApi', 'image', 'tag']

          with open('values.yaml', 'r') as f:
              lines = f.readlines()

          # Find the section and update the tag
          section_depth = 0
          found_section = False
          section_indent = -1

          for i, line in enumerate(lines):
              stripped = line.lstrip()
              indent = len(line) - len(stripped)

              # Match top-level key (e.g., 'orgApi:')
              if not found_section and stripped.startswith(parts[0] + ':'):
                  found_section = True
                  section_indent = indent
                  continue

              if found_section:
                  # If we've gone back to the same or lower indent, we left the section
                  if stripped and not stripped.startswith('#') and indent <= section_indent:
                      break

                  # Look for 'tag:' line within the section
                  if stripped.startswith('tag:'):
                      # Replace the tag value
                      lines[i] = line[:indent] + 'tag: \"' + version + '\"\n'
                      break

          with open('values.yaml', 'w') as f:
              f.writelines(lines)
          "

          # Commit and push
          git config user.name "orgtopus-release-bot"
          git config user.email "release-bot@orgtopus.ai"
          git add values.yaml
          git commit -m "Bump ${IMAGE_NAME} to ${VERSION}"
          git push origin "$BRANCH"

          # Create PR
          gh pr create \
            --repo Orgtopus-HD/helm-charts \
            --title "Bump ${IMAGE_NAME} to ${VERSION}" \
            --body "Automated version bump triggered by release \`${GITHUB_REF_NAME}\` in \`${GITHUB_REPOSITORY}\`.

          - Image: \`ghcr.io/orgtopus-hd/${IMAGE_NAME}:${VERSION}\`
          - Helm key: \`${HELM_KEY}\`

          Auto-generated by the release workflow." \
            --base main \
            --head "$BRANCH"
