name: Docker Build & Push

on:
  workflow_call:
    inputs:
      image-name:
        type: string
        required: true
        description: "Image name without registry prefix (e.g. 'chat-api')"
      context:
        type: string
        default: "."
      dockerfile:
        type: string
        default: "Dockerfile"
      push:
        type: boolean
        default: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.push }}
          tags: |
            ghcr.io/orgtopus-hd/${{ inputs.image-name }}:${{ github.sha }}
            ghcr.io/orgtopus-hd/${{ inputs.image-name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
