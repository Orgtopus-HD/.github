name: Node CI

on:
  workflow_call:
    secrets:
      SHARED_LIB_TOKEN:
        required: false
        description: "PAT for cross-repo access (unused by Node CI but accepted for caller consistency)"
    inputs:
      node-version:
        type: string
        default: "22"
      run-e2e:
        type: boolean
        default: false
        description: "Run Playwright E2E tests (requires backend services)"
      run-e2e-fast:
        type: boolean
        default: false
        description: "Run fast Playwright E2E tests (no backend needed)"

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

  e2e:
    if: inputs.run-e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      - name: E2E Tests
        run: npm run test:e2e

  e2e-fast:
    if: inputs.run-e2e-fast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Fast E2E Tests
        run: npm run test:e2e:fast
