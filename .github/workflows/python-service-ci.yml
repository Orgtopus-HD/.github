name: Python Service CI

on:
  workflow_call:
    secrets:
      SHARED_LIB_TOKEN:
        required: false
        description: "PAT for cloning orgtopus-shared (org-level secret)"
    inputs:
      python-version:
        type: string
        default: "3.13"
      coverage-threshold:
        type: number
        default: 60
      needs-shared-lib:
        type: boolean
        default: true
        description: "Whether to install orgtopus-shared from git"
      needs-postgres:
        type: boolean
        default: true
      source-dir:
        type: string
        default: "src"
        description: "Directory to lint and check coverage against"
      run-integration-tests:
        type: boolean
        default: false
        description: "Whether to run integration tests from tests/integration/"

jobs:
  lint-test-with-postgres:
    if: inputs.needs-postgres
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: orgtopus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install orgtopus-shared
        if: inputs.needs-shared-lib
        run: pip install "orgtopus-shared @ git+https://x-access-token:${SHARED_LIB_TOKEN}@github.com/Orgtopus-HD/orgtopus-shared.git@v0.1.0"
        env:
          SHARED_LIB_TOKEN: ${{ secrets.SHARED_LIB_TOKEN }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install ruff black

      - name: Lint (ruff)
        run: ruff check ${{ inputs.source-dir }}/

      - name: Format check (black)
        run: black --check ${{ inputs.source-dir }}/

      - name: Test
        run: |
          pytest tests/ -v \
            --cov=${{ inputs.source-dir }} \
            --cov-report=term-missing \
            --cov-fail-under=${{ inputs.coverage-threshold }}
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpassword@localhost:5432/orgtopus_test

  integration-test:
    if: inputs.run-integration-tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install orgtopus-shared
        if: inputs.needs-shared-lib
        run: pip install "orgtopus-shared @ git+https://x-access-token:${SHARED_LIB_TOKEN}@github.com/Orgtopus-HD/orgtopus-shared.git@v0.1.0"
        env:
          SHARED_LIB_TOKEN: ${{ secrets.SHARED_LIB_TOKEN }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest-timeout

      - name: Integration tests
        run: pytest tests/integration/ -v --timeout=120

  lint-test-no-postgres:
    if: ${{ !inputs.needs-postgres }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install orgtopus-shared
        if: inputs.needs-shared-lib
        run: pip install "orgtopus-shared @ git+https://x-access-token:${SHARED_LIB_TOKEN}@github.com/Orgtopus-HD/orgtopus-shared.git@v0.1.0"
        env:
          SHARED_LIB_TOKEN: ${{ secrets.SHARED_LIB_TOKEN }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install ruff black

      - name: Lint (ruff)
        run: ruff check ${{ inputs.source-dir }}/

      - name: Format check (black)
        run: black --check ${{ inputs.source-dir }}/

      - name: Test
        run: |
          pytest tests/ -v \
            --cov=${{ inputs.source-dir }} \
            --cov-report=term-missing \
            --cov-fail-under=${{ inputs.coverage-threshold }}
