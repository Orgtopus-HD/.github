name: Python Service CI

on:
  workflow_call:
    secrets:
      SHARED_LIB_TOKEN:
        required: false
        description: "PAT for cloning orgtopus-shared (org-level secret)"
    inputs:
      python-version:
        type: string
        default: "3.13"
      coverage-threshold:
        type: number
        default: 60
      needs-shared-lib:
        type: boolean
        default: true
        description: "Whether to install orgtopus-shared from git"
      needs-postgres:
        type: boolean
        default: true
      source-dir:
        type: string
        default: "src"
        description: "Directory to lint and check coverage against"
      run-integration-tests:
        type: boolean
        default: false
        description: "Whether to run integration tests from tests/integration/"

jobs:
  lint-test-with-postgres:
    if: inputs.needs-postgres
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Start postgres
        run: |
          docker rm -f postgres-test 2>/dev/null || true
          docker run -d --name postgres-test \
            -e POSTGRES_PASSWORD=testpassword \
            -e POSTGRES_DB=orgtopus_test \
            -p 5432:5432 \
            postgres:16-alpine
          until docker exec postgres-test pg_isready -U postgres; do sleep 1; done

      - name: Install orgtopus-shared
        if: inputs.needs-shared-lib
        run: python3.13 -m pip install --break-system-packages "orgtopus-shared @ git+https://x-access-token:${SHARED_LIB_TOKEN}@github.com/Orgtopus-HD/orgtopus-shared.git@v0.1.0"
        env:
          SHARED_LIB_TOKEN: ${{ secrets.SHARED_LIB_TOKEN }}

      - name: Install dependencies
        run: |
          python3.13 -m pip install --break-system-packages -r requirements.txt
          if [ -f requirements-dev.txt ]; then python3.13 -m pip install --break-system-packages -r requirements-dev.txt; fi
          python3.13 -m pip install --break-system-packages ruff black

      - name: Lint (ruff)
        run: python3.13 -m ruff check ${{ inputs.source-dir }}/

      - name: Format check (black)
        run: python3.13 -m black --check ${{ inputs.source-dir }}/

      - name: Test
        run: |
          python3.13 -m pytest tests/ -v \
            --cov=${{ inputs.source-dir }} \
            --cov-report=term-missing \
            --cov-fail-under=${{ inputs.coverage-threshold }}
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpassword@localhost:5432/orgtopus_test

      - name: Stop postgres
        if: always()
        run: docker rm -f postgres-test 2>/dev/null || true

  integration-test:
    if: inputs.run-integration-tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install orgtopus-shared
        if: inputs.needs-shared-lib
        run: python3.13 -m pip install --break-system-packages "orgtopus-shared @ git+https://x-access-token:${SHARED_LIB_TOKEN}@github.com/Orgtopus-HD/orgtopus-shared.git@v0.1.0"
        env:
          SHARED_LIB_TOKEN: ${{ secrets.SHARED_LIB_TOKEN }}

      - name: Install dependencies
        run: |
          python3.13 -m pip install --break-system-packages -r requirements.txt
          if [ -f requirements-dev.txt ]; then python3.13 -m pip install --break-system-packages -r requirements-dev.txt; fi
          python3.13 -m pip install --break-system-packages pytest-timeout

      - name: Integration tests
        run: python3.13 -m pytest tests/integration/ -v --timeout=120

  lint-test-no-postgres:
    if: ${{ !inputs.needs-postgres }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install orgtopus-shared
        if: inputs.needs-shared-lib
        run: python3.13 -m pip install --break-system-packages "orgtopus-shared @ git+https://x-access-token:${SHARED_LIB_TOKEN}@github.com/Orgtopus-HD/orgtopus-shared.git@v0.1.0"
        env:
          SHARED_LIB_TOKEN: ${{ secrets.SHARED_LIB_TOKEN }}

      - name: Install dependencies
        run: |
          python3.13 -m pip install --break-system-packages -r requirements.txt
          if [ -f requirements-dev.txt ]; then python3.13 -m pip install --break-system-packages -r requirements-dev.txt; fi
          python3.13 -m pip install --break-system-packages ruff black

      - name: Lint (ruff)
        run: python3.13 -m ruff check ${{ inputs.source-dir }}/

      - name: Format check (black)
        run: python3.13 -m black --check ${{ inputs.source-dir }}/

      - name: Test
        run: |
          python3.13 -m pytest tests/ -v \
            --cov=${{ inputs.source-dir }} \
            --cov-report=term-missing \
            --cov-fail-under=${{ inputs.coverage-threshold }}
