name: Bump helm values
description: >
  Open a PR in Orgtopus-HD/orgtopus-gitops that bumps a tag under a given
  values.yaml key in environments/prod/orgtopus/values.yaml. Shared by the
  reusable release workflow and by repos that need to bump the prod chart
  from their own jobs (e.g. mcp-servers after its matrix build).

  Dev tracks `latest` via Argo CD Image Updater, so release-time bumps only
  target prod. Merging the generated PR triggers ArgoCD to sync the prod cluster.

inputs:
  helm-values-key:
    description: "Dot-path to the tag to update, e.g. 'orgApi.image.tag' or 'mcpImages.tag'"
    required: true
  version:
    description: "New tag value (no leading 'v')"
    required: true
  image-name:
    description: "Display name used in the commit message and PR title"
    required: true
  helm-bump-token:
    description: "PAT with contents:write and pull-requests:write on orgtopus-gitops"
    required: true
  git-user-name:
    description: "Git committer name"
    required: false
    default: "orgtopus-release-bot"
  git-user-email:
    description: "Git committer email"
    required: false
    default: "release-bot@orgtopus.ai"

runs:
  using: composite
  steps:
    - name: Clone orgtopus-gitops, bump prod tag, open PR
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.helm-bump-token }}
        VERSION: ${{ inputs.version }}
        HELM_KEY: ${{ inputs.helm-values-key }}
        IMAGE_NAME: ${{ inputs.image-name }}
        GIT_USER_NAME: ${{ inputs.git-user-name }}
        GIT_USER_EMAIL: ${{ inputs.git-user-email }}
        VALUES_FILE: environments/prod/orgtopus/values.yaml
      run: |
        set -euo pipefail
        WORKDIR="$(mktemp -d -t gitops.XXXXXX)"
        trap 'rm -rf "$WORKDIR"' EXIT
        git clone "https://x-access-token:${GH_TOKEN}@github.com/Orgtopus-HD/orgtopus-gitops.git" "$WORKDIR"
        cd "$WORKDIR"

        python3 - <<'PY'
        import os

        key_path = os.environ["HELM_KEY"]
        version = os.environ["VERSION"]
        values_file = os.environ["VALUES_FILE"]
        parts = key_path.split(".")

        with open(values_file, "r") as f:
            lines = f.readlines()

        found_section = False
        section_indent = -1
        updated = False

        for i, line in enumerate(lines):
            stripped = line.lstrip()
            indent = len(line) - len(stripped)

            # Match top-level key (e.g. 'orgApi:')
            if not found_section and stripped.startswith(parts[0] + ":"):
                found_section = True
                section_indent = indent
                continue

            if found_section:
                # Left the section if we return to same-or-shallower indent
                if stripped and not stripped.startswith("#") and indent <= section_indent:
                    break
                if stripped.startswith("tag:"):
                    lines[i] = line[:indent] + f'tag: "{version}"\n'
                    updated = True
                    break

        if not updated:
            raise SystemExit(f"Could not find tag under key '{key_path}' in {values_file}")

        with open(values_file, "w") as f:
            f.writelines(lines)
        PY

        git config user.name  "${GIT_USER_NAME}"
        git config user.email "${GIT_USER_EMAIL}"

        BRANCH="bump/prod-${IMAGE_NAME}-${VERSION}"
        git checkout -b "${BRANCH}"
        git add "${VALUES_FILE}"

        # No-op guard: skip if prod tag already matches
        if git diff --staged --quiet; then
          echo "${VALUES_FILE} already at ${IMAGE_NAME}=${VERSION}; nothing to commit."
          exit 0
        fi

        git commit -m "Bump ${IMAGE_NAME} to ${VERSION} (prod)"
        git push -u origin "${BRANCH}"

        gh pr create \
          --repo Orgtopus-HD/orgtopus-gitops \
          --head "${BRANCH}" \
          --base master \
          --title "Bump ${IMAGE_NAME} to ${VERSION} (prod)" \
          --body "Promote ${IMAGE_NAME} v${VERSION} to production. Merging this PR will trigger ArgoCD to sync the prod cluster."
